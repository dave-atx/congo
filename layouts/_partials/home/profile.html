<article
  class="{{ if not .Site.Params.homepage.showRecent }}
    h-full
  {{ end }} flex flex-col items-center justify-center text-center"
>
  {{ partial "profile.html" }}
  {{ with .Content }}
  <section class="prose prose-congo dark:prose-invert">{{ . | emojify }}</section>
  {{ end }}
</article>
{{ with partial "recent-articles.html" . }}
<section>
  {{ . }}
</section>
{{ end }}
